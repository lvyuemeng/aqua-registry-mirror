# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: fujiwara
    repo_name: iam-policy-finder
    description: iam-policy-finder is finder of AWS IAM Policies
    version_constraint: "false"
    version_overrides:
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/fujiwara/iam-policy-finder/releases/download/{{.Version}}/{{.Asset}}
        asset: iam-policy-finder_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
