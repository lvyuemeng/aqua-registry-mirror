# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: openshift
    repo_name: osdctl
    description: CLI for the OSD utilities
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.1.0")
        url: https://gh-proxy.org/https://github.com/openshift/osdctl/releases/download/{{.Version}}/{{.Asset}}
        asset: osdctl-{{.OS}}
        format: raw
        replacements:
          darwin: macos
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.4.0")
        url: https://gh-proxy.org/https://github.com/openshift/osdctl/releases/download/{{.Version}}/{{.Asset}}
        asset: osdctl-{{.OS}}-{{.Version}}
        format: raw
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: Version == "v0.4.1"
        no_asset: true
      - version_constraint: semver("<= 0.9.4")
        url: https://gh-proxy.org/https://github.com/openshift/osdctl/releases/download/{{.Version}}/{{.Asset}}
        asset: osdctl_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        checksum:
          type: github_release
          asset: sha256sum.txt
          algorithm: sha256
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.12.0")
        url: https://gh-proxy.org/https://github.com/openshift/osdctl/releases/download/{{.Version}}/{{.Asset}}
        asset: osdctl_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        checksum:
          type: github_release
          asset: sha256sum.txt
          algorithm: sha256
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/openshift/osdctl/releases/download/{{.Version}}/{{.Asset}}
        asset: osdctl_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        checksum:
          type: github_release
          asset: sha256sum.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
