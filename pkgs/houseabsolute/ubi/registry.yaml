# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: houseabsolute
    repo_name: ubi
    description: The Universal Binary Installer
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.0.10"
        url: https://gh-proxy.org/https://github.com/houseabsolute/ubi/releases/download/{{.Version}}/{{.Asset}}
        asset: ubi-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: Darwin
          linux: Linux
          windows: Windows
        overrides:
          - goos: windows
            format: zip
      - version_constraint: semver("<= 0.0.7")
        url: https://gh-proxy.org/https://github.com/houseabsolute/ubi/releases/download/{{.Version}}/{{.Asset}}
        asset: ubi-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 0.0.9")
        url: https://gh-proxy.org/https://github.com/houseabsolute/ubi/releases/download/{{.Version}}/{{.Asset}}
        asset: ubi-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        overrides:
          - goos: darwin
            replacements:
              arm64: aarch64
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 0.0.19")
        url: https://gh-proxy.org/https://github.com/houseabsolute/ubi/releases/download/{{.Version}}/{{.Asset}}
        asset: ubi-{{.OS}}-{{.Arch}}-musl.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: Darwin
          linux: Linux
          windows: Windows
        overrides:
          - goos: darwin
            asset: ubi-{{.OS}}-{{.Arch}}.{{.Format}}
          - goos: windows
            format: zip
            asset: ubi-{{.OS}}-{{.Arch}}.{{.Format}}
      - version_constraint: semver("<= 0.1.1")
        url: https://gh-proxy.org/https://github.com/houseabsolute/ubi/releases/download/{{.Version}}/{{.Asset}}
        asset: ubi-{{.OS}}-{{.Arch}}-musl.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: Darwin
          linux: Linux
          windows: Windows
        overrides:
          - goos: darwin
            asset: ubi-{{.OS}}-{{.Arch}}.{{.Format}}
          - goos: windows
            format: zip
            asset: ubi-{{.OS}}-{{.Arch}}.{{.Format}}
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/houseabsolute/ubi/releases/download/{{.Version}}/{{.Asset}}
        asset: ubi-{{.OS}}-musl-{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          darwin: macOS
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        overrides:
          - goos: darwin
            asset: ubi-{{.OS}}-{{.Arch}}.{{.Format}}
          - goos: windows
            format: zip
            asset: ubi-{{.OS}}-msvc-{{.Arch}}.{{.Format}}
