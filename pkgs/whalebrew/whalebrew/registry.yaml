# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: whalebrew
    repo_name: whalebrew
    description: Homebrew, but with Docker images
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "0.2.5"
        url: https://gh-proxy.org/https://github.com/whalebrew/whalebrew/releases/download/{{.Version}}/{{.Asset}}
        asset: whalebrew-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        checksum:
          type: github_release
          asset: "{{.Asset}}.md5"
          algorithm: md5
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.1.0")
        url: https://gh-proxy.org/https://github.com/whalebrew/whalebrew/releases/download/{{.Version}}/{{.Asset}}
        asset: whalebrew-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.2.1")
        no_asset: true
      - version_constraint: semver("<= 0.2.4")
        url: https://gh-proxy.org/https://github.com/whalebrew/whalebrew/releases/download/{{.Version}}/{{.Asset}}
        asset: whalebrew-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.3.1")
        url: https://gh-proxy.org/https://github.com/whalebrew/whalebrew/releases/download/{{.Version}}/{{.Asset}}
        asset: whalebrew-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        checksum:
          type: github_release
          asset: "{{.Asset}}.md5"
          algorithm: md5
        supported_envs:
          - linux
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/whalebrew/whalebrew/releases/download/{{.Version}}/{{.Asset}}
        asset: whalebrew-{{.OS}}-{{.Arch}}
        format: raw
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        checksum:
          type: github_release
          asset: "{{.Asset}}.md5"
          algorithm: md5
        supported_envs:
          - linux
          - darwin
