# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: timvisee
    repo_name: ffsend
    description: Easily and securely share files from the command line. A fully featured Firefox Send client
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version in ["v0.2.13", "v0.2.75"]
        url: https://gh-proxy.org/https://github.com/timvisee/ffsend/releases/download/{{.Version}}/{{.Asset}}
        asset: ffsend-{{.Version}}-{{.OS}}-{{.Arch}}-static
        format: raw
        replacements:
          amd64: x64
        supported_envs:
          - linux/amd64
      - version_constraint: Version in ["v0.2.60", "v0.2.69"]
        url: https://gh-proxy.org/https://github.com/timvisee/ffsend/releases/download/{{.Version}}/{{.Asset}}
        asset: ffsend-{{.Version}}-{{.OS}}
        format: raw
        windows_arm_emulation: true
        replacements:
          amd64: x64
          darwin: macos
        overrides:
          - goos: windows
            asset: ffsend-{{.Version}}-{{.OS}}-{{.Arch}}-static
        supported_envs:
          - darwin
          - windows/amd64
      - version_constraint: Version == "v0.2.47"
        url: https://gh-proxy.org/https://github.com/timvisee/ffsend/releases/download/{{.Version}}/{{.Asset}}
        asset: ffsend-{{.Version}}-{{.OS}}-{{.Arch}}-static
        format: raw
        replacements:
          amd64: x64
          darwin: macos
        overrides:
