        format: tar.gz
        checksum:
          type: github_release
          asset: swag_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
      - version_constraint: semver("<= 1.8.9")
        url: https://gh-proxy.org/https://github.com/swaggo/swag/releases/download/{{.Version}}/{{.Asset}}
        asset: swag_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: linux
            replacements:
              arm64: aarch64
        supported_envs:
          - linux
          - darwin
      - version_constraint: Version == "v1.8.10"
        url: https://gh-proxy.org/https://github.com/swaggo/swag/releases/download/{{.Version}}/{{.Asset}}
        asset: swag_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
