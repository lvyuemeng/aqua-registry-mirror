# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: microsoft
    repo_name: kiota
    description: OpenAPI based HTTP Client code generator
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 1.0.1")
        url: https://gh-proxy.org/https://github.com/microsoft/kiota/releases/download/{{.Version}}/{{.Asset}}
        asset: "{{.OS}}-{{.Arch}}.{{.Format}}"
        files:
          - name: kiota
            src: "{{.OS}}-{{.Arch}}/kiota"
        format: zip
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: x64
          darwin: osx
          windows: win
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/microsoft/kiota/releases/download/{{.Version}}/{{.Asset}}
        asset: "{{.OS}}-{{.Arch}}.{{.Format}}"
        format: zip
        windows_arm_emulation: true
        replacements:
          amd64: x64
          darwin: osx
          windows: win
        supported_envs:
          - darwin
          - windows
          - amd64
