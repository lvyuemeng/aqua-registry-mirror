# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: genuinetools
    repo_name: amicontained
    description: Container introspection tool. Find out what container runtime is being used as well as features available
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.4.5")
        url: https://gh-proxy.org/https://github.com/genuinetools/amicontained/releases/download/{{.Version}}/{{.Asset}}
        asset: amicontained-{{.OS}}-{{.Arch}}
        format: raw
        checksum:
          type: github_release
          asset: "{{.Asset}}.md5"
          algorithm: md5
        supported_envs:
          - linux
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/genuinetools/amicontained/releases/download/{{.Version}}/{{.Asset}}
        asset: amicontained-{{.OS}}-{{.Arch}}
        format: raw
        checksum:
          type: github_release
          asset: "{{.Asset}}.md5"
          algorithm: md5
        supported_envs:
          - linux/amd64
