# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: context-labs
    repo_name: mactop
    search_words:
      - goasitop
    description: mactop - Apple Silicon Monitor Top written in pure Golang! Under 1,000 lines of code
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.1.2")
        url: https://gh-proxy.org/https://github.com/context-labs/mactop/releases/download/{{.Version}}/{{.Asset}}
        asset: goasitop_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: goasitop
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - darwin/arm64
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/context-labs/mactop/releases/download/{{.Version}}/{{.Asset}}
        asset: mactop_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - darwin/arm64
