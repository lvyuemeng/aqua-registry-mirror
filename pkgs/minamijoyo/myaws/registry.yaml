# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: minamijoyo
    repo_name: myaws
    description: A human friendly AWS CLI written in Go
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.0.1"
        url: https://gh-proxy.org/https://github.com/minamijoyo/myaws/releases/download/{{.Version}}/{{.Asset}}
        asset: myaws_{{trimV .Version}}_myaws_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: zip
        rosetta2: true
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.0.3")
        url: https://gh-proxy.org/https://github.com/minamijoyo/myaws/releases/download/{{.Version}}/{{.Asset}}
        asset: myaws_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: zip
        rosetta2: true
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.3.4")
        url: https://gh-proxy.org/https://github.com/minamijoyo/myaws/releases/download/{{.Version}}/{{.Asset}}
        asset: myaws_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.4.1")
        url: https://gh-proxy.org/https://github.com/minamijoyo/myaws/releases/download/{{.Version}}/{{.Asset}}
        asset: myaws_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        checksum:
          type: github_release
          asset: myaws_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/minamijoyo/myaws/releases/download/{{.Version}}/{{.Asset}}
        asset: myaws_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: myaws_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
