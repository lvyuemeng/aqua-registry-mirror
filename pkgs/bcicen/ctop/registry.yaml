# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: bcicen
    repo_name: ctop
    description: Top-like interface for container metrics
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.4.1-deps"
        no_asset: true
      - version_constraint: Version == "v0.6.0"
        url: https://gh-proxy.org/https://github.com/bcicen/ctop/releases/download/{{.Version}}/{{.Asset}}
        asset: ctop-{{trimV .Version}}-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        supported_envs:
          - linux
          - darwin
      - version_constraint: Version == "v0.6.1"
        url: https://gh-proxy.org/https://github.com/bcicen/ctop/releases/download/{{.Version}}/{{.Asset}}
        asset: ctop-{{trimV .Version}}-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        checksum:
          type: github_release
          asset: sha256sums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
      - version_constraint: Version == "0.7.6"
        url: https://gh-proxy.org/https://github.com/bcicen/ctop/releases/download/{{.Version}}/{{.Asset}}
        asset: ctop-{{.Version}}-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        complete_windows_ext: false
        checksum:
          type: github_release
          asset: sha256sums.txt
          algorithm: sha256
      - version_constraint: semver("<= 0.5.1")
        url: https://gh-proxy.org/https://github.com/bcicen/ctop/releases/download/{{.Version}}/{{.Asset}}
        asset: ctop-{{trimV .Version}}-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/bcicen/ctop/releases/download/{{.Version}}/{{.Asset}}
        asset: ctop-{{trimV .Version}}-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        complete_windows_ext: false
        checksum:
          type: github_release
          asset: sha256sums.txt
          algorithm: sha256
