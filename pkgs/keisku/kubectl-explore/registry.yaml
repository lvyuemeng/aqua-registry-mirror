# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: keisku
    repo_name: kubectl-explore
    description: A better kubectl explain with the fuzzy finder
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.3.0")
        url: https://gh-proxy.org/https://github.com/keisku/kubectl-explore/releases/download/{{.Version}}/{{.Asset}}
        asset: kubectl-explore_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
        checksum:
          type: github_release
          asset: kubectl-explore_{{.Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
      - version_constraint: semver("<= 0.3.1")
        url: https://gh-proxy.org/https://github.com/keisku/kubectl-explore/releases/download/{{.Version}}/{{.Asset}}
        asset: kubectl-explore_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
        checksum:
          type: github_release
          asset: kubectl-explore_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/keisku/kubectl-explore/releases/download/{{.Version}}/{{.Asset}}
        asset: kubectl-explore_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: kubectl-explore_{{trimV .Version}}_checksums.txt
          algorithm: sha256
