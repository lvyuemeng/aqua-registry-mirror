# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: dadav
    repo_name: helm-schema
    description: Generate jsonschemas from helm charts
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.4.2")
        url: https://gh-proxy.org/https://github.com/dadav/helm-schema/releases/download/{{.Version}}/{{.Asset}}
        asset: helm-schema_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
      - version_constraint: Version == "0.4.3"
        url: https://gh-proxy.org/https://github.com/dadav/helm-schema/releases/download/{{.Version}}/{{.Asset}}
        asset: helm-schema_.{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        # Checksum file is broken
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        overrides:
          - goos: windows
            format: zip
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/dadav/helm-schema/releases/download/{{.Version}}/{{.Asset}}
        asset: helm-schema_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
