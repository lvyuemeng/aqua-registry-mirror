# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: peripheryapp
    repo_name: periphery
    description: A tool to identify unused code in Swift projects
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 2.13.0")
        url: https://gh-proxy.org/https://github.com/peripheryapp/periphery/releases/download/{{.Version}}/{{.Asset}}
        asset: periphery-v{{.Version}}.zip
        supported_envs:
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/peripheryapp/periphery/releases/download/{{.Version}}/{{.Asset}}
        asset: periphery-{{.Version}}.zip
        supported_envs:
          - darwin
