# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: Arriven
    repo_name: db1000n
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.5.15"
        url: https://gh-proxy.org/https://github.com/Arriven/db1000n/releases/download/{{.Version}}/{{.Asset}}
        asset: db1000n-{{.Version}}-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: "{{.Asset}}.md5"
          algorithm: md5
        overrides:
          - goos: windows
            format: zip
      - version_constraint: Version == "v0.8.6"
        url: https://gh-proxy.org/https://github.com/Arriven/db1000n/releases/download/{{.Version}}/{{.Asset}}
        asset: db1000n_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: db1000n_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
