# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: mantil-io
    repo_name: mantil
    description: Build your AWS Lambda-based Go backends quicker than ever
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.1.1")
        url: https://gh-proxy.org/https://github.com/mantil-io/mantil/releases/download/{{.Version}}/{{.Asset}}
        asset: mantil_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          darwin: Darwin
        checksum:
          type: github_release
          asset: mantil_checksums.txt
          algorithm: sha256
        supported_envs:
          - darwin
      - version_constraint: semver("<= 0.1.12")
        url: https://gh-proxy.org/https://github.com/mantil-io/mantil/releases/download/{{.Version}}/{{.Asset}}
        asset: mantil_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          darwin: Darwin
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - darwin
      - version_constraint: semver("<= 0.1.22")
        url: https://gh-proxy.org/https://github.com/mantil-io/mantil/releases/download/{{.Version}}/{{.Asset}}
        asset: mantil_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
      - version_constraint: semver("<= 0.1.28")
        url: https://gh-proxy.org/https://github.com/mantil-io/mantil/releases/download/{{.Version}}/{{.Asset}}
        asset: mantil_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/mantil-io/mantil/releases/download/{{.Version}}/{{.Asset}}
        asset: mantil_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
