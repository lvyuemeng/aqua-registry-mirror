# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    name: aakso/ssh-inscribe/sshi
    repo_owner: aakso
    repo_name: ssh-inscribe
    description: SSH CA Client/Server
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.4.1")
        url: https://gh-proxy.org/https://github.com/aakso/ssh-inscribe/releases/download/{{.Version}}/{{.Asset}}
        asset: sshi-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        replacements:
          amd64: x86_64
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.9.1")
        url: https://gh-proxy.org/https://github.com/aakso/ssh-inscribe/releases/download/{{.Version}}/{{.Asset}}
        asset: sshi-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: Version == "0.10.0"
        url: https://gh-proxy.org/https://github.com/aakso/ssh-inscribe/releases/download/{{.Version}}/{{.Asset}}
        asset: sshi-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/aakso/ssh-inscribe/releases/download/{{.Version}}/{{.Asset}}
        asset: sshi-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - darwin
          - windows
          - amd64
