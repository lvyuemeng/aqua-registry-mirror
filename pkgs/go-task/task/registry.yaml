# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: go-task
    repo_name: task
    description: A task runner / simpler Make alternative written in Go
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v1.3.0"
        url: https://gh-proxy.org/https://github.com/go-task/task/releases/download/{{.Version}}/{{.Asset}}
        asset: task_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: task_checksums.txt
          algorithm: sha256
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: Version == "v1.3.1"
        url: https://gh-proxy.org/https://github.com/go-task/task/releases/download/{{.Version}}/{{.Asset}}
        asset: task_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: x64
          darwin: macOS
        checksum:
          type: github_release
          asset: task_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 1.2.0")
        url: https://gh-proxy.org/https://github.com/go-task/task/releases/download/{{.Version}}/{{.Asset}}
        asset: task_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 1.4.2")
        url: https://gh-proxy.org/https://github.com/go-task/task/releases/download/{{.Version}}/{{.Asset}}
        asset: task_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: task_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 1.4.4")
        url: https://gh-proxy.org/https://github.com/go-task/task/releases/download/{{.Version}}/{{.Asset}}
        asset: task_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: task_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 3.0.1")
        url: https://gh-proxy.org/https://github.com/go-task/task/releases/download/{{.Version}}/{{.Asset}}
        asset: task_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: task_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 3.7.0")
        url: https://gh-proxy.org/https://github.com/go-task/task/releases/download/{{.Version}}/{{.Asset}}
        asset: task_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: task_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/go-task/task/releases/download/{{.Version}}/{{.Asset}}
        asset: task_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: task_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
