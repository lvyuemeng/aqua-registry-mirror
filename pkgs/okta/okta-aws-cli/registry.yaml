# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: okta
    repo_name: okta-aws-cli
    description: A CLI for having Okta as the IdP for AWS CLI operations
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.0.3")
        url: https://gh-proxy.org/https://github.com/okta/okta-aws-cli/releases/download/{{.Version}}/{{.Asset}}
        asset: okta-aws-cli_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: okta-aws-cli
            src: okta-aws-cli_{{.Version}}
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
      - version_constraint: Version == "v0.0.4"
        url: https://gh-proxy.org/https://github.com/okta/okta-aws-cli/releases/download/{{.Version}}/{{.Asset}}
        asset: okta-aws-cli_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: okta-aws-cli
            src: okta-aws-cli_{{.Version}}
        overrides:
          - goos: darwin
            goarch: amd64
            asset: okta-aws-cli_{{trimV .Version}}_{{.OS}}_{{.Arch}}_signed.{{.Format}}
            checksum:
              enabled: false
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
      - version_constraint: semver("<= 0.2.1")
        url: https://gh-proxy.org/https://github.com/okta/okta-aws-cli/releases/download/{{.Version}}/{{.Asset}}
        asset: okta-aws-cli_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: okta-aws-cli
            src: okta-aws-cli_{{.Version}}
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
      - version_constraint: Version == "v0.3.0"
        url: https://gh-proxy.org/https://github.com/okta/okta-aws-cli/releases/download/{{.Version}}/{{.Asset}}
        asset: okta-aws-cli_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: okta-aws-cli
            src: okta-aws-cli_{{.Version}}
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
      - version_constraint: semver("<= 1.2.1")
        url: https://gh-proxy.org/https://github.com/okta/okta-aws-cli/releases/download/{{.Version}}/{{.Asset}}
        asset: okta-aws-cli_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: okta-aws-cli
            src: okta-aws-cli_{{.Version}}
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
      - version_constraint: Version == "v1.2.2"
        url: https://gh-proxy.org/https://github.com/okta/okta-aws-cli/releases/download/{{.Version}}/{{.Asset}}
        asset: okta-aws-cli_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: okta-aws-cli
            src: okta-aws-cli_{{.Version}}
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
      - version_constraint: Version == "v2.0.0"
        url: https://gh-proxy.org/https://github.com/okta/okta-aws-cli/releases/download/{{.Version}}/{{.Asset}}
        asset: okta-aws-cli_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: okta-aws-cli
            src: okta-aws-cli_{{.Version}}
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/okta/okta-aws-cli/releases/download/{{.Version}}/{{.Asset}}
        asset: okta-aws-cli_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        supported_envs:
          - linux
          - darwin
          - windows/arm64
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
