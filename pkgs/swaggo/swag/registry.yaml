# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: swaggo
    repo_name: swag
    description: Automatically generate RESTful API documentation with Swagger 2.0 for Go
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 1.4.0")
        no_asset: true
      - version_constraint: semver("<= 1.6.9")
        url: https://gh-proxy.org/https://github.com/swaggo/swag/releases/download/{{.Version}}/{{.Asset}}
        asset: swag_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: Version == "v1.7.0"
        url: https://gh-proxy.org/https://github.com/swaggo/swag/releases/download/{{.Version}}/{{.Asset}}
        asset: swag_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: linux
            replacements:
              arm64: aarch64
        supported_envs:
          - linux
          - darwin
      - version_constraint: Version == "v1.7.1"
        url: https://gh-proxy.org/https://github.com/swaggo/swag/releases/download/{{.Version}}/{{.Asset}}
        asset: swag_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        files:
          - name: swag
            src: swag_{{.OS}}_{{.Arch}}/swag
        supported_envs:
          - linux
          - darwin
      - version_constraint: semver("<= 1.8.1")
        url: https://gh-proxy.org/https://github.com/swaggo/swag/releases/download/{{.Version}}/{{.Asset}}
        asset: swag_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: linux
            replacements:
              arm64: aarch64
        supported_envs:
          - linux
          - darwin
      - version_constraint: Version == "v1.8.2"
        url: https://gh-proxy.org/https://github.com/swaggo/swag/releases/download/{{.Version}}/{{.Asset}}
