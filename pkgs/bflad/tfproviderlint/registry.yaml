# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: bflad
    repo_name: tfproviderlint
    description: Terraform Provider Lint Tool
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.28.1")
        url: https://gh-proxy.org/https://github.com/bflad/tfproviderlint/releases/download/{{.Version}}/{{.Asset}}
        asset: tfproviderlint_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: tfproviderlint_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/bflad/tfproviderlint/releases/download/{{.Version}}/{{.Asset}}
        asset: tfproviderlint_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: tfproviderlint_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
