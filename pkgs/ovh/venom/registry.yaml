# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: ovh
    repo_name: venom
    description: "Manage and run your integration tests with efficiency - Venom run executors (script, HTTP Request, web, imap, etc... ) and assertions"
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.11.0"
        url: https://gh-proxy.org/https://github.com/ovh/venom/releases/download/{{.Version}}/{{.Asset}}
        asset: venom-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: Version == "v0.21.1"
        url: https://gh-proxy.org/https://github.com/ovh/venom/releases/download/{{.Version}}/{{.Asset}}
        asset: venom.{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        supported_envs:
          - linux
          - darwin
      - version_constraint: semver("<= 0.16.0")
        url: https://gh-proxy.org/https://github.com/ovh/venom/releases/download/{{.Version}}/{{.Asset}}
        asset: venom-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        complete_windows_ext: false
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 1.0.1")
        url: https://gh-proxy.org/https://github.com/ovh/venom/releases/download/{{.Version}}/{{.Asset}}
        asset: venom.{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        complete_windows_ext: false
      - version_constraint: semver("<= 1.1.0-beta.2")
        url: https://gh-proxy.org/https://github.com/ovh/venom/releases/download/{{.Version}}/{{.Asset}}
        asset: venom.{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        complete_windows_ext: false
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/ovh/venom/releases/download/{{.Version}}/{{.Asset}}
        asset: venom.{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        complete_windows_ext: false
