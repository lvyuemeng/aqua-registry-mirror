# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: cross-rs
    repo_name: cross
    description: “Zero setup” cross compilation and “cross testing” of Rust crates
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.1.2-rc1"
        url: https://gh-proxy.org/https://github.com/cross-rs/cross/releases/download/{{.Version}}/{{.Asset}}
        asset: cross-{{.Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-musl
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: Version == "v0.1.5"
        url: https://gh-proxy.org/https://github.com/cross-rs/cross/releases/download/{{.Version}}/{{.Asset}}
        asset: cross-{{.Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: apple-darwin
        supported_envs:
          - darwin
      - version_constraint: semver("<= 0.1.2")
        url: https://gh-proxy.org/https://github.com/cross-rs/cross/releases/download/{{.Version}}/{{.Asset}}
        asset: cross-{{.Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          linux: unknown-linux-musl
        supported_envs:
          - linux/amd64
      - version_constraint: semver("<= 0.1.16")
        url: https://gh-proxy.org/https://github.com/cross-rs/cross/releases/download/{{.Version}}/{{.Asset}}
        asset: cross-{{.Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-musl
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.2.1")
        url: https://gh-proxy.org/https://github.com/cross-rs/cross/releases/download/{{.Version}}/{{.Asset}}
        asset: cross-{{.Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/cross-rs/cross/releases/download/{{.Version}}/{{.Asset}}
        asset: cross-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        supported_envs:
          - darwin
          - windows
          - amd64
