# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: nao1215
    repo_name: gup
    description: 'gup - Update binaries installed by "go install" with goroutines'
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.7.1")
        no_asset: true
      - version_constraint: semver("<= 0.22.0")
        url: https://gh-proxy.org/https://github.com/nao1215/gup/releases/download/{{.Version}}/{{.Asset}}
        asset: gup_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/nao1215/gup/releases/download/{{.Version}}/{{.Asset}}
        asset: gup_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
