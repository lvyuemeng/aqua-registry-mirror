# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: drager
    repo_name: wasm-pack
    aliases:
      - name: rustwasm/wasm-pack
    description: your favorite rust -> wasm workflow tool
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.2.0")
        no_asset: true
      - version_constraint: semver("<= 0.4.2")
        url: https://gh-proxy.org/https://github.com/drager/wasm-pack/releases/download/{{.Version}}/{{.Asset}}
        asset: wasm-pack-{{.Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        files:
          - name: wasm-pack
            src: "{{.AssetWithoutExt}}/wasm-pack"
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-musl
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.10.1")
        url: https://gh-proxy.org/https://github.com/drager/wasm-pack/releases/download/{{.Version}}/{{.Asset}}
        asset: wasm-pack-{{.Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        files:
          - name: wasm-pack
            src: "{{.AssetWithoutExt}}/wasm-pack"
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/drager/wasm-pack/releases/download/{{.Version}}/{{.Asset}}
        asset: wasm-pack-{{.Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        files:
          - name: wasm-pack
            src: "{{.AssetWithoutExt}}/wasm-pack"
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        overrides:
          - goos: linux
            replacements:
              arm64: aarch64
