# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: okteto
    repo_name: okteto
    description: Develop your applications directly in your Kubernetes Cluster
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.4.6")
        url: https://gh-proxy.org/https://github.com/okteto/okteto/releases/download/{{.Version}}/{{.Asset}}
        asset: cnd-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        complete_windows_ext: false
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 1.4.7")
        url: https://gh-proxy.org/https://github.com/okteto/okteto/releases/download/{{.Version}}/{{.Asset}}
        asset: okteto-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        complete_windows_ext: false
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 1.6.4")
        url: https://gh-proxy.org/https://github.com/okteto/okteto/releases/download/{{.Version}}/{{.Asset}}
        asset: okteto-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        complete_windows_ext: false
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
      - version_constraint: semver("<= 1.10.5")
        url: https://gh-proxy.org/https://github.com/okteto/okteto/releases/download/{{.Version}}/{{.Asset}}
        asset: okteto-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        overrides:
          - goos: windows
            asset: okteto
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/okteto/okteto/releases/download/{{.Version}}/{{.Asset}}
        asset: okteto-{{.OS}}-{{.Arch}}
        format: raw
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        overrides:
          - goos: windows
            asset: okteto
