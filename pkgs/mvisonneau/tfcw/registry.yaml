# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: mvisonneau
    repo_name: tfcw
    description: Terraform Cloud Wrapper
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "0.0.4"
        no_asset: true
      - version_constraint: Version == "edge"
        url: https://gh-proxy.org/https://github.com/mvisonneau/tfcw/releases/download/{{.Version}}/{{.Asset}}
        asset: tfcw_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: tfcw_{{.Version}}_sha512sums.txt
          algorithm: sha512
        overrides:
          - goos: windows
            format: zip
      - version_constraint: Version == "v0.0.10"
        url: https://gh-proxy.org/https://github.com/mvisonneau/tfcw/releases/download/{{.Version}}/{{.Asset}}
        asset: tfcw_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: tfcw_{{trimV .Version}}_SHA256SUMS
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
      - version_constraint: Version == "v0.0.11"
        url: https://gh-proxy.org/https://github.com/mvisonneau/tfcw/releases/download/{{.Version}}/{{.Asset}}
        asset: tfcw_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: tfcw_{{.Version}}_sha512sums.txt
          algorithm: sha512
        overrides:
          - goos: windows
            format: zip
      - version_constraint: semver("<= 0.0.9")
        url: https://gh-proxy.org/https://github.com/mvisonneau/tfcw/releases/download/{{.Version}}/{{.Asset}}
        asset: tfcw_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/mvisonneau/tfcw/releases/download/{{.Version}}/{{.Asset}}
        asset: tfcw_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: tfcw_{{.Version}}_sha512sums.txt
          algorithm: sha512
        overrides:
          - goos: windows
            format: zip
