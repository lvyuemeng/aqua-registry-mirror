# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: Traackr
    repo_name: binnacle
    description: An opinionated tool to interact with Kubernetes' Helm
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.0.3")
        url: https://gh-proxy.org/https://github.com/Traackr/binnacle/releases/download/{{.Version}}/{{.Asset}}
        asset: binnacle-{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: SHA256SUM.txt
          algorithm: sha256
        supported_envs:
          - linux/amd64
          - windows
      - version_constraint: semver("<= 0.6.0")
        url: https://gh-proxy.org/https://github.com/Traackr/binnacle/releases/download/{{.Version}}/{{.Asset}}
        asset: binnacle-{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: SHA256SUM.txt
          algorithm: sha256
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/Traackr/binnacle/releases/download/{{.Version}}/{{.Asset}}
        asset: binnacle-{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: SHA256SUM.txt
          algorithm: sha256
        supported_envs:
          - darwin
          - windows
          - amd64
