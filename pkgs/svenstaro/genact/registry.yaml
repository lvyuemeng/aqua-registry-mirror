# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: svenstaro
    repo_name: genact
    description: A nonsense activity generator
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.2.2")
        url: https://gh-proxy.org/https://github.com/svenstaro/genact/releases/download/{{.Version}}/{{.Asset}}
        asset: genact-{{.OS}}
        format: raw
        replacements:
          windows: win
        supported_envs:
          - linux/amd64
          - windows/amd64
      - version_constraint: semver("<= 0.7.0")
        url: https://gh-proxy.org/https://github.com/svenstaro/genact/releases/download/{{.Version}}/{{.Asset}}
        asset: genact-{{.OS}}
        format: raw
        replacements:
          darwin: osx
          windows: win
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 0.12.0")
        url: https://gh-proxy.org/https://github.com/svenstaro/genact/releases/download/{{.Version}}/{{.Asset}}
        asset: genact-{{.Version}}-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: macos
        overrides:
          - goos: linux
            replacements:
              arm64: aarch64
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/svenstaro/genact/releases/download/{{.Version}}/{{.Asset}}
        asset: genact-{{trimV .Version}}-{{.Arch}}-{{.OS}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        overrides:
          - goos: linux
            replacements:
              arm64: aarch64
