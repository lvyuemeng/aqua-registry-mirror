# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: keidarcy
    repo_name: e1s
    description: E1S - Easily Manage AWS ECS Resources in Terminal
    version_constraint: "false"
    version_overrides:
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/keidarcy/e1s/releases/download/{{.Version}}/{{.Asset}}
        asset: e1s_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        overrides:
          - goos: darwin
            asset: e1s_{{trimV .Version}}_{{.OS}}_all.{{.Format}}
        checksum:
          type: github_release
          asset: e1s_{{trimV .Version}}_checksums.txt
          algorithm: sha256
