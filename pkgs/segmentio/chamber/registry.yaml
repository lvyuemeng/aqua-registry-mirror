# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: segmentio
    repo_name: chamber
    description: CLI for managing secrets
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version in ["v2.10.2", "v2.10.5"]
        no_asset: true
      - version_constraint: semver("<= 2.1.0")
        url: https://gh-proxy.org/https://github.com/segmentio/chamber/releases/download/{{.Version}}/{{.Asset}}
        asset: chamber-{{.Version}}-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 2.3.2")
        url: https://gh-proxy.org/https://github.com/segmentio/chamber/releases/download/{{.Version}}/{{.Asset}}
        asset: chamber-{{.Version}}-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        checksum:
          type: github_release
          asset: chamber-{{.Version}}.sha256sums
          algorithm: sha256
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 2.10.7")
        url: https://gh-proxy.org/https://github.com/segmentio/chamber/releases/download/{{.Version}}/{{.Asset}}
        asset: chamber-{{.Version}}-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: chamber-{{.Version}}.sha256sums
          algorithm: sha256
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/segmentio/chamber/releases/download/{{.Version}}/{{.Asset}}
        asset: chamber-{{.Version}}-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: chamber-{{.Version}}.sha256sums
          algorithm: sha256
