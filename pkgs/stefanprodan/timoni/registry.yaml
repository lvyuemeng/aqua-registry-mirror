# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: stefanprodan
    repo_name: timoni
    description: Timoni is a package manager for Kubernetes, powered by CUE and inspired by Helm
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("< 0.7.1")
        url: https://gh-proxy.org/https://github.com/stefanprodan/timoni/releases/download/{{.Version}}/{{.Asset}}
        asset: timoni_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - linux
          - amd64
        checksum:
          type: github_release
          asset: timoni_{{trimV .Version}}_checksums.txt
          algorithm: sha256
      - version_constraint: semver("< 0.10.0")
        url: https://gh-proxy.org/https://github.com/stefanprodan/timoni/releases/download/{{.Version}}/{{.Asset}}
        asset: timoni_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - linux
          - amd64
        checksum:
          type: github_release
          asset: timoni_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        slsa_provenance:
          type: github_release
          asset: multiple.intoto.jsonl
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/stefanprodan/timoni/releases/download/{{.Version}}/{{.Asset}}
        asset: timoni_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - linux
          - amd64
        checksum:
          type: github_release
          asset: timoni_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        slsa_provenance:
          type: github_release
          asset: timoni_{{trimV .Version}}_provenance.intoto.jsonl
