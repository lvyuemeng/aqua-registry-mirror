# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: sonatype-nexus-community
    repo_name: nancy
    description: A tool to check for vulnerabilities in your Golang dependencies, powered by Sonatype OSS Index
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v1.0.19"
        url: https://gh-proxy.org/https://github.com/sonatype-nexus-community/nancy/releases/download/{{.Version}}/{{.Asset}}
        asset: nancy-{{.Version}}-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: nancychecksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
      - version_constraint: semver("<= 0.0.44")
        url: https://gh-proxy.org/https://github.com/sonatype-nexus-community/nancy/releases/download/{{.Version}}/{{.Asset}}
        asset: nancy-{{.OS}}.{{.Arch}}-{{.Version}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 0.1.3")
        url: https://gh-proxy.org/https://github.com/sonatype-nexus-community/nancy/releases/download/{{.Version}}/{{.Asset}}
        asset: nancy-{{.OS}}.{{.Arch}}-{{.Version}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: nancychecksums.txt
          algorithm: sha256
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 1.0.5")
        url: https://gh-proxy.org/https://github.com/sonatype-nexus-community/nancy/releases/download/{{.Version}}/{{.Asset}}
        asset: nancy-{{.OS}}.{{.Arch}}-{{.Version}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: nancychecksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 1.0.17")
        url: https://gh-proxy.org/https://github.com/sonatype-nexus-community/nancy/releases/download/{{.Version}}/{{.Asset}}
        asset: nancy-{{.Version}}-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: nancychecksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/sonatype-nexus-community/nancy/releases/download/{{.Version}}/{{.Asset}}
        asset: nancy-{{.Version}}-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: nancychecksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
