# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: fujiwara
    repo_name: ecsta
    description: ECS Task Assistant tool
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.3.4")
        url: https://gh-proxy.org/https://github.com/fujiwara/ecsta/releases/download/{{.Version}}/{{.Asset}}
        asset: ecsta_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/fujiwara/ecsta/releases/download/{{.Version}}/{{.Asset}}
        asset: ecsta_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
