# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: go-gost
    repo_name: gost
    description: GO Simple Tunnel - a simple tunnel written in golang
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 3.0.0-beta.2")
        url: https://gh-proxy.org/https://github.com/go-gost/gost/releases/download/{{.Version}}/{{.Asset}}
        asset: gost-{{.OS}}-{{.Arch}}-{{trimV .Version}}.{{.Format}}
        format: gz
        windows_arm_emulation: true
        files:
          - name: gost
            src: gost-{{.OS}}-{{.Arch}}-{{trimV .Version}}
        overrides:
          - goos: windows
            format: zip
            files:
              - name: gost
                src: gost-windows-{{.Arch}}.exe
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 3.0.0-beta.6")
        url: https://gh-proxy.org/https://github.com/go-gost/gost/releases/download/{{.Version}}/{{.Asset}}
        asset: gost-{{.OS}}-{{.Arch}}-{{trimV .Version}}.{{.Format}}
        format: gz
        files:
          - name: gost
            src: gost-{{.OS}}-{{.Arch}}-{{trimV .Version}}
        overrides:
          - goos: windows
            format: zip
            files:
              - name: gost
                src: gost-windows-{{.Arch}}.exe
        supported_envs:
          - linux/amd64
          - darwin
          - windows
      - version_constraint: semver("<= 3.0.0-rc.4")
        url: https://gh-proxy.org/https://github.com/go-gost/gost/releases/download/{{.Version}}/{{.Asset}}
        asset: gost-{{.OS}}-{{.Arch}}-{{trimV .Version}}.{{.Format}}
        format: gz
        files:
          - name: gost
            src: gost-{{.OS}}-{{.Arch}}-{{trimV .Version}}
        overrides:
          - goos: windows
            format: zip
            files:
              - name: gost
                src: gost-windows-{{.Arch}}.exe
        supported_envs:
          - linux/amd64
          - darwin
          - windows
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/go-gost/gost/releases/download/{{.Version}}/{{.Asset}}
        asset: gost_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        overrides:
          - goos: windows
            format: zip
            files:
              - name: gost
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
