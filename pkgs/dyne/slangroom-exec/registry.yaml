# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: dyne
    repo_name: slangroom-exec
    description: Execute all Zencode from Zenroom and Slangroom plugins in one shot
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 1.5.0")
        url: https://gh-proxy.org/https://github.com/dyne/slangroom-exec/releases/download/{{.Version}}/{{.Asset}}
        asset: slangroom-exec-{{.OS}}-{{.Arch}}
        format: raw
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        supported_envs:
          - linux
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/dyne/slangroom-exec/releases/download/{{.Version}}/{{.Asset}}
        asset: slangroom-exec-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: slangroom-exec
          - name: slexfe
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        supported_envs:
          - linux
          - darwin
