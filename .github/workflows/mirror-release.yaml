---
name: Mirror release

on:
  push:
    tags:
      - "mirror-*"

permissions: {}

jobs:
  release:
    name: Create GitHub Release for mirror tag
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mirror ${{ github.ref_name }}"
          body: "Automated mirror of aquaproj/aqua-registry synced on ${{ github.ref_name }}."
          make_latest: true
