# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: squat
    repo_name: kilo
    description: Kilo is a multi-cloud network overlay built on WireGuard and designed for Kubernetes (k8s + wg = kg)
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "0.1.0"
        no_asset: true
      - version_constraint: Version == "0.2.0"
        url: https://gh-proxy.org/https://github.com/squat/kilo/releases/download/{{.Version}}/{{.Asset}}
        asset: kgctl-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        complete_windows_ext: false
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/squat/kilo/releases/download/{{.Version}}/{{.Asset}}
        asset: kgctl-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        complete_windows_ext: false
