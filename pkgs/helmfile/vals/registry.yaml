# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: helmfile
    repo_name: vals
    aliases:
      - name: variantdev/vals
    description: Helm-like configuration values loader with support for various sources
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version in ["v0.16.0", "v0.17.0"]
        no_asset: true
      - version_constraint: Version == "v0.16.1"
        url: https://gh-proxy.org/https://github.com/helmfile/vals/releases/download/{{.Version}}/{{.Asset}}
        asset: vals_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: vals_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
      - version_constraint: Version == "v0.16.2"
        url: https://gh-proxy.org/https://github.com/helmfile/vals/releases/download/{{.Version}}/{{.Asset}}
        asset: vals_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: vals_{{trimV .Version}}_checksums.txt
          algorithm: sha256
      - version_constraint: semver("<= 0.11.0")
        url: https://gh-proxy.org/https://github.com/helmfile/vals/releases/download/{{.Version}}/{{.Asset}}
        asset: vals_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        checksum:
          type: github_release
          asset: vals_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.15.0")
        url: https://gh-proxy.org/https://github.com/helmfile/vals/releases/download/{{.Version}}/{{.Asset}}
        asset: vals_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        checksum:
          type: github_release
          asset: vals_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/helmfile/vals/releases/download/{{.Version}}/{{.Asset}}
        asset: vals_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: vals_{{trimV .Version}}_checksums.txt
          algorithm: sha256
