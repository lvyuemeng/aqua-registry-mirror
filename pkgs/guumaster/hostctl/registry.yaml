# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: guumaster
    repo_name: hostctl
    description: Your dev tool to manage /etc/hosts like a pro
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 1.0.6")
        url: https://gh-proxy.org/https://github.com/guumaster/hostctl/releases/download/{{.Version}}/{{.Asset}}
        asset: hostctl_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: 64-bit
          darwin: macOS
        checksum:
          type: github_release
          asset: hostctl_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 1.0.8")
        no_asset: true
      - version_constraint: semver("<= 1.1.0")
        url: https://gh-proxy.org/https://github.com/guumaster/hostctl/releases/download/{{.Version}}/{{.Asset}}
        asset: hostctl_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: 64-bit
          darwin: macOS
        checksum:
          type: github_release
          asset: hostctl_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 1.1.2")
        url: https://gh-proxy.org/https://github.com/guumaster/hostctl/releases/download/{{.Version}}/{{.Asset}}
        asset: hostctl_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: 64-bit
          darwin: macOS
        checksum:
          type: github_release
          asset: hostctl_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/guumaster/hostctl/releases/download/{{.Version}}/{{.Asset}}
        asset: hostctl_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: 64-bit
          darwin: macOS
        checksum:
          type: github_release
          asset: hostctl_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
