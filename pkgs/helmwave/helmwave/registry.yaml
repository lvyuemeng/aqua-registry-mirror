# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: helmwave
    repo_name: helmwave
    description: New  wave for @helm
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.1.5")
        no_asset: true
      - version_constraint: semver("<= 0.8.4")
        url: https://gh-proxy.org/https://github.com/helmwave/helmwave/releases/download/{{.Version}}/{{.Asset}}
        asset: helmwave-{{.Version}}-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: "{{.Asset}}.md5"
          algorithm: md5
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: Version == "0.9.0"
        url: https://gh-proxy.org/https://github.com/helmwave/helmwave/releases/download/{{.Version}}/{{.Asset}}
        asset: helmwave_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
      - version_constraint: semver("<= 0.9.5")
        url: https://gh-proxy.org/https://github.com/helmwave/helmwave/releases/download/{{.Version}}/{{.Asset}}
        asset: helmwave_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
      - version_constraint: semver("<= 0.13.0")
        url: https://gh-proxy.org/https://github.com/helmwave/helmwave/releases/download/{{.Version}}/{{.Asset}}
        asset: helmwave_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
      - version_constraint: semver("<= 0.19.7")
        url: https://gh-proxy.org/https://github.com/helmwave/helmwave/releases/download/{{.Version}}/{{.Asset}}
        asset: helmwave_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
      - version_constraint: Version == "v0.20.0"
        no_asset: true
      - version_constraint: semver("<= 0.35.3")
        url: https://gh-proxy.org/https://github.com/helmwave/helmwave/releases/download/{{.Version}}/{{.Asset}}
        asset: helmwave_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/helmwave/helmwave/releases/download/{{.Version}}/{{.Asset}}
        asset: helmwave_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
