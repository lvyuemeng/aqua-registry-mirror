# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: amacneil
    repo_name: dbmate
    description: A lightweight, framework-agnostic database migration tool
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v1.13.0"
        url: https://gh-proxy.org/https://github.com/amacneil/dbmate/releases/download/{{.Version}}/{{.Asset}}
        asset: dbmate-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        complete_windows_ext: false
        replacements:
          darwin: macos
      - version_constraint: semver("<= 1.6.0")
        url: https://gh-proxy.org/https://github.com/amacneil/dbmate/releases/download/{{.Version}}/{{.Asset}}
        asset: dbmate-{{.OS}}-{{.Arch}}
        format: raw
        supported_envs:
          - linux/amd64
      - version_constraint: semver("<= 1.9.1")
        url: https://gh-proxy.org/https://github.com/amacneil/dbmate/releases/download/{{.Version}}/{{.Asset}}
        asset: dbmate-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          darwin: macos
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: semver("<= 1.11.0")
        url: https://gh-proxy.org/https://github.com/amacneil/dbmate/releases/download/{{.Version}}/{{.Asset}}
        asset: dbmate-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          darwin: macos
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/amacneil/dbmate/releases/download/{{.Version}}/{{.Asset}}
        asset: dbmate-{{.OS}}-{{.Arch}}
        format: raw
        windows_arm_emulation: true
        replacements:
          darwin: macos
