# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: babarot
    repo_name: changed-objects
    aliases:
      - name: b4b4r07/changed-objects
    description: Get changed objects in Git commit
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.1.0"
        url: https://gh-proxy.org/https://github.com/babarot/changed-objects/releases/download/{{.Version}}/{{.Asset}}
        asset: get-changed-objects_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
        files:
          - name: get-changed-objects
        checksum:
          type: github_release
          asset: get-changed-objects_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: Version == "v0.1.1"
        url: https://gh-proxy.org/https://github.com/babarot/changed-objects/releases/download/{{.Version}}/{{.Asset}}
        asset: get-changed-objects-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        files:
          - name: get-changed-objects
        replacements:
          amd64: x86_64
        checksum:
          type: github_release
          asset: get-changed-objects_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: Version == "v0.1.2"
        url: https://gh-proxy.org/https://github.com/babarot/changed-objects/releases/download/{{.Version}}/{{.Asset}}
        asset: get-changed-objects-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        files:
          - name: get-changed-objects
        checksum:
          type: github_release
          asset: get-changed-objects_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: Version == "v0.1.11"
        url: https://gh-proxy.org/https://github.com/babarot/changed-objects/releases/download/{{.Version}}/{{.Asset}}
        asset: changed-objects-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
        checksum:
          type: github_release
          asset: changed-objects_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - linux/amd64
      - version_constraint: semver("<= 0.1.7")
        url: https://gh-proxy.org/https://github.com/babarot/changed-objects/releases/download/{{.Version}}/{{.Asset}}
        asset: changed-objects-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        checksum:
          type: github_release
          asset: changed-objects_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.1.16")
        url: https://gh-proxy.org/https://github.com/babarot/changed-objects/releases/download/{{.Version}}/{{.Asset}}
        asset: changed-objects-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
        checksum:
          type: github_release
          asset: changed-objects_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
      - version_constraint: semver("<= 0.3.7")
        url: https://gh-proxy.org/https://github.com/babarot/changed-objects/releases/download/{{.Version}}/{{.Asset}}
        asset: changed-objects-{{.OS}}-{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
        checksum:
          type: github_release
          asset: changed-objects_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/babarot/changed-objects/releases/download/{{.Version}}/{{.Asset}}
        asset: changed-objects_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: changed-objects_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
