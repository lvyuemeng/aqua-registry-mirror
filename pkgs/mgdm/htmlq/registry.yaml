# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: mgdm
    repo_name: htmlq
    description: Like jq, but for HTML
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.2.0"
        url: https://gh-proxy.org/https://github.com/mgdm/htmlq/releases/download/{{.Version}}/{{.Asset}}
        asset: htmlq_{{.Arch}}_{{.OS}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x64
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/mgdm/htmlq/releases/download/{{.Version}}/{{.Asset}}
        asset: htmlq-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
