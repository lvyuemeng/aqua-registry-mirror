# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: go-to-k
    repo_name: lamver
    description: CLI tool to search AWS Lambda runtime and versions across regions
    asset: lamver_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
    format: tar.gz
    replacements:
      amd64: x86_64
      darwin: Darwin
      linux: Linux
      windows: Windows
    checksum:
      type: github_release
      asset: checksums.txt
      algorithm: sha256
    version_constraint: semver(">= 0.4.2")
    version_overrides:
      - version_constraint: Version == "v0.4.1"
        url: https://gh-proxy.org/https://github.com/go-to-k/lamver/releases/download/{{.Version}}/{{.Asset}}
        asset: lamver_.{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        checksum:
          enabled: false
      - version_constraint: semver("< 0.4.1")
