# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: imsnif
    repo_name: bandwhich
    description: Terminal bandwidth utilization tool
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.22.0"
        url: https://gh-proxy.org/https://github.com/imsnif/bandwhich/releases/download/{{.Version}}/{{.Asset}}
        asset: bandwhich-{{.Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-musl
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.3.2")
        url: https://gh-proxy.org/https://github.com/imsnif/bandwhich/releases/download/{{.Version}}/{{.Asset}}
        asset: what
        format: raw
        supported_envs:
          - linux/amd64
      - version_constraint: semver("<= 0.5.1")
        url: https://gh-proxy.org/https://github.com/imsnif/bandwhich/releases/download/{{.Version}}/{{.Asset}}
        asset: what-v{{.Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        files:
          - name: what
        replacements:
          amd64: x86_64
          linux: unknown-linux-musl
        supported_envs:
          - linux/amd64
      - version_constraint: semver("<= 0.20.0")
        url: https://gh-proxy.org/https://github.com/imsnif/bandwhich/releases/download/{{.Version}}/{{.Asset}}
        asset: bandwhich-v{{.Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          linux: unknown-linux-musl
        supported_envs:
          - linux/amd64
      - version_constraint: semver("<= 0.22.2")
        url: https://gh-proxy.org/https://github.com/imsnif/bandwhich/releases/download/{{.Version}}/{{.Asset}}
        asset: bandwhich-{{.Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        overrides:
          - goos: windows
            format: zip
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/imsnif/bandwhich/releases/download/{{.Version}}/{{.Asset}}
        asset: bandwhich-{{.Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        overrides:
          - goos: windows
            format: zip
