# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: turbot
    repo_name: powerpipe
    description: "Powerpipe: Dashboards for DevOps. Visualize cloud configurations. Assess security posture against a massive library of benchmarks. Build custom dashboards with code"
    version_constraint: "false"
    version_overrides:
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/turbot/powerpipe/releases/download/{{.Version}}/{{.Asset}}
        asset: powerpipe.{{.OS}}.{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
