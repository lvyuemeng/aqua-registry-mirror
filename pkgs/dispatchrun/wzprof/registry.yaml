# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: dispatchrun
    repo_name: wzprof
    aliases:
      - name: stealthrocket/wzprof
    description: WebAssembly Profiler based on Wazero
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.1.5"
        url: https://gh-proxy.org/https://github.com/dispatchrun/wzprof/releases/download/{{.Version}}/{{.Asset}}
        asset: wzprof_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: wzprof_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/dispatchrun/wzprof/releases/download/{{.Version}}/{{.Asset}}
        asset: wzprof_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: wzprof_{{trimV .Version}}_checksums.txt
          algorithm: sha256
