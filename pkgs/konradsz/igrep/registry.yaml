# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: konradsz
    repo_name: igrep
    description: Interactive Grep
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.2.0")
        url: https://gh-proxy.org/https://github.com/konradsz/igrep/releases/download/{{.Version}}/{{.Asset}}
        asset: igrep-{{.Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: zip
        overrides:
          - goos: darwin
            replacements:
              arm64: aarch64
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-gnu
        supported_envs:
          - linux/amd64
          - darwin
        files:
          - name: ig
            src: target/{{.Arch}}-{{.OS}}/release/ig
      - version_constraint: Version == "v0.3.0"
        url: https://gh-proxy.org/https://github.com/konradsz/igrep/releases/download/{{.Version}}/{{.Asset}}
        asset: igrep-{{.Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        overrides:
          - goos: darwin
            replacements:
              arm64: aarch64
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-gnu
        supported_envs:
          - linux/amd64
          - darwin
        files:
          - name: ig
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/konradsz/igrep/releases/download/{{.Version}}/{{.Asset}}
        asset: igrep-{{.Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        overrides:
          - goos: darwin
            replacements:
              arm64: aarch64
          - goos: windows
            format: zip
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-gnu
          windows: pc-windows-msvc
        supported_envs:
          - darwin
          - windows
          - amd64
        files:
          - name: ig
