# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: CrunchyData
    repo_name: postgres-operator-client
    description: the Command Line Interface (CLI) for the Crunchy Postgres Operator
    files:
      - name: kubectl-pgo
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.1.0")
        url: https://gh-proxy.org/https://github.com/CrunchyData/postgres-operator-client/releases/download/{{.Version}}/{{.Asset}}
        asset: kubectl-pgo-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/CrunchyData/postgres-operator-client/releases/download/{{.Version}}/{{.Asset}}
        asset: kubectl-pgo-{{.OS}}-{{.Arch}}
        format: raw
        supported_envs:
          - linux
          - darwin
