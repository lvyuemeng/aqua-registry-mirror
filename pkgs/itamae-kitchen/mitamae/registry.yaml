# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: itamae-kitchen
    repo_name: mitamae
    description: mitamae is a fast, simple, and single-binary configuration management tool with a DSL like Chef
    files:
      - name: mitamae
        src: mitamae-{{.Arch}}-{{.OS}}
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.11.2"
        url: https://gh-proxy.org/https://github.com/itamae-kitchen/mitamae/releases/download/{{.Version}}/{{.Asset}}
        asset: mitamae-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
        overrides:
          - goos: linux
            replacements:
              arm64: aarch64
        supported_envs:
          - linux
          - darwin
      - version_constraint: semver("<= 0.0.4")
        url: https://gh-proxy.org/https://github.com/itamae-kitchen/mitamae/releases/download/{{.Version}}/{{.Asset}}
        asset: itamae-{{.Arch}}-{{.OS}}
        format: raw
        rosetta2: true
        replacements:
          amd64: x86_64
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.0.16")
        url: https://gh-proxy.org/https://github.com/itamae-kitchen/mitamae/releases/download/{{.Version}}/{{.Asset}}
        asset: itamae-{{.Arch}}-{{.OS}}.{{.Format}}
        format: zip
        rosetta2: true
        replacements:
          amd64: x86_64
        files:
          - name: itamae
            src: itamae-{{.Arch}}-{{.OS}}
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.3.0")
        url: https://gh-proxy.org/https://github.com/itamae-kitchen/mitamae/releases/download/{{.Version}}/{{.Asset}}
        asset: itamae-{{.Arch}}-{{.OS}}.{{.Format}}
        format: zip
        rosetta2: true
        replacements:
          amd64: x86_64
        files:
          - name: itamae
            src: itamae-{{.Arch}}-{{.OS}}
        overrides:
          - goos: linux
            format: tar.gz
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.4.2")
        url: https://gh-proxy.org/https://github.com/itamae-kitchen/mitamae/releases/download/{{.Version}}/{{.Asset}}
        asset: mitamae-{{.Arch}}-{{.OS}}.{{.Format}}
        format: zip
        rosetta2: true
        replacements:
          amd64: x86_64
        overrides:
          - goos: linux
            format: tar.gz
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 1.11.1")
        url: https://gh-proxy.org/https://github.com/itamae-kitchen/mitamae/releases/download/{{.Version}}/{{.Asset}}
        asset: mitamae-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 1.11.7")
        url: https://gh-proxy.org/https://github.com/itamae-kitchen/mitamae/releases/download/{{.Version}}/{{.Asset}}
        asset: mitamae-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
        overrides:
          - goos: linux
            replacements:
              arm64: aarch64
        supported_envs:
          - linux
          - darwin
      - version_constraint: semver("< 1.14.4")
        url: https://gh-proxy.org/https://github.com/itamae-kitchen/mitamae/releases/download/{{.Version}}/{{.Asset}}
        asset: mitamae-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          arm64: aarch64
        supported_envs:
          - linux
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/itamae-kitchen/mitamae/releases/download/{{.Version}}/{{.Asset}}
        asset: mitamae-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          arm64: aarch64
        github_artifact_attestations:
          signer_workflow: itamae-kitchen/mitamae/.github/workflows/build.yml
        supported_envs:
          - linux
          - darwin
