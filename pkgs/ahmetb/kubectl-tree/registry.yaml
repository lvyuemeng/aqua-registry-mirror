# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: ahmetb
    repo_name: kubectl-tree
    description: kubectl plugin to browse Kubernetes object hierarchies as a tree  (star the repo if you are using)
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.4.0"
        url: https://gh-proxy.org/https://github.com/ahmetb/kubectl-tree/releases/download/{{.Version}}/{{.Asset}}
        asset: kubectl-tree_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: kubectl-tree_{{trimV .Version}}_checksums.txt
          algorithm: sha256
      - version_constraint: semver("<= 0.2.0")
        url: https://gh-proxy.org/https://github.com/ahmetb/kubectl-tree/releases/download/{{.Version}}/{{.Asset}}
        asset: kubectl-tree_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        checksum:
          type: github_release
          asset: kubectl-tree_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.3.1")
        url: https://gh-proxy.org/https://github.com/ahmetb/kubectl-tree/releases/download/{{.Version}}/{{.Asset}}
        asset: kubectl-tree_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: kubectl-tree_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/ahmetb/kubectl-tree/releases/download/{{.Version}}/{{.Asset}}
        asset: kubectl-tree_{{.Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        checksum:
          type: github_release
          asset: kubectl-tree_{{trimV .Version}}_checksums.txt
          algorithm: sha256
