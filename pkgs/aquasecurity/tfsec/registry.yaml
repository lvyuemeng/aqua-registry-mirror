# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: aquasecurity
    repo_name: tfsec
    description: Security scanner for your Terraform code
    asset: tfsec_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
    format: tar.gz
    checksum:
      type: github_release
      asset: tfsec_{{trimV .Version}}_checksums.txt
      algorithm: sha256
    version_constraint: semver(">= 1.26.2")
    version_overrides:
      - version_constraint: semver(">= 1.26.2")
        checksum:
          type: github_release
          asset: tfsec_checksums.txt
          algorithm: sha256
      - version_constraint: semver(">= 1.24.4")
      - version_constraint: semver(">= 1.23.2")
        url: https://gh-proxy.org/https://github.com/aquasecurity/tfsec/releases/download/{{.Version}}/{{.Asset}}
        asset: tfsec-{{.OS}}-{{.Arch}}
        format: raw
        checksum:
          type: github_release
          asset: tfsec_checksums.txt
          algorithm: sha256
      - version_constraint: semver(">= 1.18.0")
      - version_constraint: semver(">= 1.16.1")
        url: https://gh-proxy.org/https://github.com/aquasecurity/tfsec/releases/download/{{.Version}}/{{.Asset}}
        asset: tfsec-{{.OS}}-{{.Arch}}
        format: raw
        checksum:
          type: github_release
          asset: tfsec_checksums.txt
          algorithm: sha256
      - version_constraint: semver(">= 1.0.0-rc.1")
        url: https://gh-proxy.org/https://github.com/aquasecurity/tfsec/releases/download/{{.Version}}/{{.Asset}}
        asset: tfsec-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: false
        supported_envs:
          - linux
          - darwin
        checksum:
          type: github_release
          asset: tfsec_checksums.txt
          algorithm: sha256
      - version_constraint: semver(">= 0.63.1")
        url: https://gh-proxy.org/https://github.com/aquasecurity/tfsec/releases/download/{{.Version}}/{{.Asset}}
        asset: tfsec-{{.OS}}-{{.Arch}}
        format: raw
        supported_envs:
          - linux
          - darwin
        rosetta2: false
        checksum:
          enabled: false
      - version_constraint: semver(">= 0.58.7")
        url: https://gh-proxy.org/https://github.com/aquasecurity/tfsec/releases/download/{{.Version}}/{{.Asset}}
        asset: tfsec-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: false
        supported_envs:
          - darwin
          - amd64
        checksum:
          type: github_release
          asset: tfsec_checksums.txt
          algorithm: sha256
      - version_constraint: semver(">= 0.51.1")
        url: https://gh-proxy.org/https://github.com/aquasecurity/tfsec/releases/download/{{.Version}}/{{.Asset}}
        asset: tfsec-{{.OS}}-{{.Arch}}
        format: raw
        supported_envs:
          - darwin
          - linux
          - amd64
        rosetta2: false
        checksum:
          type: github_release
          asset: tfsec_checksums.txt
          algorithm: sha256
      - version_constraint: semver(">= 0.39.35")
        url: https://gh-proxy.org/https://github.com/aquasecurity/tfsec/releases/download/{{.Version}}/{{.Asset}}
        asset: tfsec-{{.OS}}-{{.Arch}}
        format: raw
        supported_envs:
          - darwin
          - amd64
        rosetta2: true
        checksum:
          type: github_release
          asset: tfsec_checksums.txt
          algorithm: sha256
      - version_constraint: semver(">= 0.9.0")
        url: https://gh-proxy.org/https://github.com/aquasecurity/tfsec/releases/download/{{.Version}}/{{.Asset}}
        asset: tfsec-{{.OS}}-{{.Arch}}
        format: raw
        supported_envs:
          - darwin
          - amd64
        rosetta2: true
        checksum:
          enabled: false
      - version_constraint: semver(">= 0.8.1")
        url: https://gh-proxy.org/https://github.com/aquasecurity/tfsec/releases/download/{{.Version}}/{{.Asset}}
        asset: tfsec-{{.OS}}-{{.Arch}}
        format: raw
        supported_envs:
          - linux/amd64
          - windows/amd64
        rosetta2: false
        checksum:
          enabled: false
      - version_constraint: semver("< 0.8.1")
        url: https://gh-proxy.org/https://github.com/aquasecurity/tfsec/releases/download/{{.Version}}/{{.Asset}}
        asset: tfsec-{{.OS}}-{{.Arch}}
        format: raw
        supported_envs:
          - darwin
          - amd64
        rosetta2: true
        checksum:
          enabled: false
