# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: nametake
    repo_name: golangci-lint-langserver
    description: golangci-lint language server
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.0.2")
        url: https://gh-proxy.org/https://github.com/nametake/golangci-lint-langserver/releases/download/{{.Version}}/{{.Asset}}
        asset: golangci-lint-langserver_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
        supported_envs:
          - linux/amd64
          - darwin
        checksum:
          type: github_release
          asset: golangci-lint-langserver_{{trimV .Version}}_checksums.txt
          algorithm: sha256
      - version_constraint: semver("<= 0.0.4")
        url: https://gh-proxy.org/https://github.com/nametake/golangci-lint-langserver/releases/download/{{.Version}}/{{.Asset}}
        asset: golangci-lint-langserver_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
        supported_envs:
          - linux/amd64
          - darwin
        checksum:
          type: github_release
          asset: golangci-lint-langserver_{{trimV .Version}}_checksums.txt
          algorithm: sha256
      - version_constraint: semver("<= 0.0.6")
        url: https://gh-proxy.org/https://github.com/nametake/golangci-lint-langserver/releases/download/{{.Version}}/{{.Asset}}
        asset: golangci-lint-langserver_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
        supported_envs:
          - linux
          - darwin
        checksum:
          type: github_release
          asset: golangci-lint-langserver_{{trimV .Version}}_checksums.txt
          algorithm: sha256
      - version_constraint: Version == "v0.0.7"
        url: https://gh-proxy.org/https://github.com/nametake/golangci-lint-langserver/releases/download/{{.Version}}/{{.Asset}}
        asset: golangci-lint-langserver_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
        supported_envs:
          - linux
          - darwin
        checksum:
          type: github_release
          asset: golangci-lint-langserver_{{trimV .Version}}_checksums.txt
          algorithm: sha256
      - version_constraint: Version == "v0.0.8"
        url: https://gh-proxy.org/https://github.com/nametake/golangci-lint-langserver/releases/download/{{.Version}}/{{.Asset}}
        asset: golangci-lint-langserver_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        overrides:
          - goos: windows
            format: zip
        replacements:
          amd64: x86_64
        checksum:
          type: github_release
          asset: golangci-lint-langserver_{{trimV .Version}}_checksums.txt
          algorithm: sha256
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/nametake/golangci-lint-langserver/releases/download/{{.Version}}/{{.Asset}}
        asset: golangci-lint-langserver_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        overrides:
          - goos: windows
            format: zip
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: golangci-lint-langserver_{{trimV .Version}}_checksums.txt
          algorithm: sha256
