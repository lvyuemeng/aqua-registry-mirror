# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: purton-tech
    repo_name: cloak
    description: Secrets automation for developers
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 1.5.0")
        url: https://gh-proxy.org/https://github.com/purton-tech/cloak/releases/download/{{.Version}}/{{.Asset}}
        asset: cli
        format: raw
        supported_envs:
          - linux/amd64
      - version_constraint: semver("<= 1.17.7")
        url: https://gh-proxy.org/https://github.com/purton-tech/cloak/releases/download/{{.Version}}/{{.Asset}}
        asset: cloak-{{.OS}}
        format: raw
        rosetta2: true
        replacements:
          darwin: macos
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 1.17.11")
        url: https://gh-proxy.org/https://github.com/purton-tech/cloak/releases/download/{{.Version}}/{{.Asset}}
        asset: cloak-{{.OS}}
        format: raw
        rosetta2: true
        replacements:
          darwin: macos
        supported_envs:
          - darwin
      - version_constraint: Version == "v1.17.12"
        no_asset: true
      - version_constraint: semver("<= 1.17.14")
        url: https://gh-proxy.org/https://github.com/purton-tech/cloak/releases/download/{{.Version}}/{{.Asset}}
        asset: cloak-{{.OS}}
        format: raw
        rosetta2: true
        replacements:
          darwin: macos
        supported_envs:
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/purton-tech/cloak/releases/download/{{.Version}}/{{.Asset}}
        asset: cloak-{{.OS}}
        format: raw
        rosetta2: true
        replacements:
          darwin: macos
        supported_envs:
          - linux/amd64
          - darwin
