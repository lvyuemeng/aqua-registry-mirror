# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: 99designs
    repo_name: aws-vault
    description: A vault for securely storing and accessing AWS credentials in development environments
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v2.3.2"
        url: https://gh-proxy.org/https://github.com/99designs/aws-vault/releases/download/{{.Version}}/{{.Asset}}
        asset: aws-vault-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: Version == "v2.3.3"
        url: https://gh-proxy.org/https://github.com/99designs/aws-vault/releases/download/{{.Version}}/{{.Asset}}
        asset: aws-vault-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: Darwin
        supported_envs:
          - darwin
      - version_constraint: semver("<= 2.3.1")
        url: https://gh-proxy.org/https://github.com/99designs/aws-vault/releases/download/{{.Version}}/{{.Asset}}
        asset: aws-vault-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: Darwin
        supported_envs:
