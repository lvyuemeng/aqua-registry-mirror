# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: nikochiko
    repo_name: autosaved
    description: Never worry about losing your code. Written in Go
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.1"
        url: https://gh-proxy.org/https://github.com/nikochiko/autosaved/releases/download/{{.Version}}/{{.Asset}}
        asset: asdi_{{.OS}}_{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        files:
          - name: asdi
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/nikochiko/autosaved/releases/download/{{.Version}}/{{.Asset}}
        asset: autosaved_{{.OS}}_{{.Arch}}
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        supported_envs:
          - darwin
          - windows
          - amd64
